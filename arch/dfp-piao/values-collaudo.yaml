# Default values for dfp-piao.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This block is for setting up the ingress
# L'ingress instrada /area-riservata/ al FE, /area-riservata/api e /area-riservata/config al gateway.
# Tutto è same-origin sullo stesso host: nessun proxy_pass lato nginx FE.
ingress:
  public:
    enabled: false
    className: "nginx"
    hosts:
    - host: "piaocoll.dfp.gov.it"
      paths:
        - path: /area-riservata
          pathType: Prefix
      service: fe
  private:
    enabled: false
    className: "nginx"
    hosts:
      - host: "piaocoll.dfp.gov.it"
        paths:
          - path: /area-riservata/api
            pathType: Prefix
        service: gateway
  privateConfig:
    enabled: false
    className: "nginx"
    hosts:
      - host: "piaocoll.dfp.gov.it"
        paths:
          - path: /area-riservata/config
            pathType: Prefix
        service: gateway
  privateExternal:
    enabled: false
    className: "nginx"
    hosts:
      - host: "piaocoll.dfp.gov.it"
        paths:
          - path: /area-riservata/external
            pathType: Prefix
        service: gateway
serviceAccount:
  create: false
  automount: true
  annotations: {}

deployments:
  gateway:
    image:
      repository: 354280290990.dkr.ecr.eu-south-1.amazonaws.com/piao/dfp-piao-gateway
    configMaps:
      - iam-cm
  be:
    image:
      repository: 354280290990.dkr.ecr.eu-south-1.amazonaws.com/piao/dfp-piao-be
    configMaps:
      - be-cm
    secrets:
      - db-security
    livenessProbe:
      httpGet:
        path: /actuator/health/liveness
        port: http
      initialDelaySeconds: 120
      periodSeconds: 20
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /actuator/health/readiness
        port: http
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 30
  bff:
    image:
      repository: 354280290990.dkr.ecr.eu-south-1.amazonaws.com/piao/dfp-piao-bff
    livenessProbe:
      httpGet:
        path: /actuator/health/liveness
        port: http
      initialDelaySeconds: 120
      periodSeconds: 20
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /actuator/health/readiness
        port: http
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 30
    configMaps:
      - bff-cm
      - iam-cm
    secrets:
      - queue-security
      - s3-security
      - minerva-security
  sync-pp:
    image:
      repository: 354280290990.dkr.ecr.eu-south-1.amazonaws.com/piao/dfp-sync-pp
    configMaps:
      - sync-cm
    secrets:
      - opencms-security
    livenessProbe:
      httpGet:
        path: /actuator/health/liveness
        port: http
      initialDelaySeconds: 120
      periodSeconds: 20
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /actuator/health/readiness
        port: http
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 30
  fe:
    image:
      repository: 354280290990.dkr.ecr.eu-south-1.amazonaws.com/piao/dfp-piao-fe
    livenessProbe:
      httpGet:
        path: /area-riservata/health
        port: http
    readinessProbe:
      httpGet:
        path: /area-riservata/health


iam:
  issuerUrl : https://sso-coll.dfp.gov.it
  redirectUri: https://piaocoll.dfp.gov.it/area-riservata
  logoutUrl: https://sso-coll.dfp.gov.it/connect/endsession
  clientid: "piao_coll"
externalRoute:
  gestioneUtentiSvc: "dfp-common-coll-gestione-utenti-svc.dfp-common-coll:8080"
  notificheSvc: "dfp-common-coll-notifiche-svc.dfp-common-coll:8080"
  ticketSvc: "dfp-common-coll-ticket-svc.dfp-common-coll:8080"


deploymentDefaults:
  replicaCount: 1
  image:
    repository: 354280290990.dkr.ecr.eu-south-1.amazonaws.com/piao/dfp-piao-fe
    pullPolicy: Always
    tag: "0.0.0"
  configMaps:
    - services-cm
    - logging-cm
  secrets:
    - db-security
  imagePullSecrets: []
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 10m
      memory: 400Mi
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: http
    initialDelaySeconds: 60
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 3
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 80
  volumes: {}
  volumeMounts: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
