        port: 8080
















deploymentDefaults:
  replicaCount: 1
  image:
    pullPolicy: Always
    tag: "0.0.0"
  cmValues: {}
  imagePullSecrets:
    - name: registry-security
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 1
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /actuator/health
      port: http
    initialDelaySeconds: 120
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /actuator/health
      port: http
    failureThreshold: 30
    periodSeconds: 10
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
  nodeSelector: {}
  tolerations: []
  affinity: {}