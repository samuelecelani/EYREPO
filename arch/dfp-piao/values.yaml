# Default values for dfp-piao.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This block is for setting up the ingress
ingress:
  public:
    enabled: true
    className: "nginx"
    hosts:
    - host: "dfp-piao.ey.test"
      paths:
        - path: /
          pathType: Prefix
      service: frontend
  private:
    enabled: true
    className: "nginx"
    hosts:
    - host: "dfp-piao.ey.test"
      paths:
        - path: /api
          pathType: Prefix
      service: gateway

serviceAccount:
  create: false
  automount: true
  annotations: {}

deployments:
  frontend:
    image:
      repository: localhost:8081/dfp-docker-repo/dfp-piao-fe
      tag: "1.0.0"
    readinessProbe:
      httpGet:
        path: /health
    livenessProbe:
      httpGet:
        path: /health
        port: http















deploymentDefaults:
  replicaCount: 1
  image:
    repository: nexus.bip.test/dfp-docker-repo/dfp-piao-fe
    pullPolicy: Always
    tag: "0.0.0"
  cmValues: {}
  imagePullSecrets:
    - name: registry-security
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 1
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /actuator/health
      port: http
    initialDelaySeconds: 120
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /actuator/health
      port: http
    failureThreshold: 30
    periodSeconds: 10
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
  volumes:
    - name: fedata
      hostPath:
        path: "/volumes"
        type: Directory
  volumeMounts:
    - name: fedata
      mountPath: "/app/data"
      readOnly: true
  nodeSelector: {}
  tolerations: []
  affinity: {}