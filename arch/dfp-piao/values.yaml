# This block is for setting up the ingress
ingress:
  public:
    enabled: true
    className: "nginx"
    hosts:
    - host: "dfp-piao.ey.test"
      paths:
        - path: /
          pathType: Prefix
      service: frontend
  private:
    enabled: true
    className: "nginx"
    hosts:
    - host: "dfp-piao.ey.test"
      paths:
        - path: /api
          pathType: Prefix
      service: gateway

serviceAccount:
  create: false
  automount: true
  annotations: {}

deployments:
