      MONGODB_URL_AUTH: "mongodb+srv://utentemongo:NoSQLSvil123@mongoserver.global.mongocluster.cosmos.azure.com/?tls=true&authMechanism=SCRAM-SHA-256&retrywrites=false&maxIdleTimeMS=12000"
