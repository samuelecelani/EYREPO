apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd-image-updater.argoproj.io/image-list: dfp-piao-fe=localhost:8081/dfp-docker-repo/dfp-piao-fe,dfp-piao-ga=localhost:8081/dfp-docker-repo/dfp-gateway
    argocd-image-updater.argoproj.io/dfp-piao-fe.helm.image-name: deployments.frontend.image.name
    argocd-image-updater.argoproj.io/dfp-piao-fe.helm.image-tag: deployments.frontend.image.tag
    argocd-image-updater.argoproj.io/dfp-piao-ga.helm.image-name: deployments.gateway.image.name
    argocd-image-updater.argoproj.io/dfp-piao-ga.helm.image-tag: deployments.gateway.image.tag
    argocd-image-updater.argoproj.io/update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: git
  name: dfp-piao
  namespace: commons
spec:
  destination:
    namespace: dfp-piao
    server: https://kubernetes.default.svc
  project: dfp-piao
  source:
    path: arch/dfp-piao
    repoURL: https://github.com/samuelecelani/EYREPO.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true