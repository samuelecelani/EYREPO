apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dfp-piao-fe
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:samuelecelani/EYREPO.git
    targetRevision: main
    path: arch/argocd-config/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: commons
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
