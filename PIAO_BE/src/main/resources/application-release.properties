#######LOGGING OUTPUT FORMAT############
# Must be one of console,json
log.output.format=json
log.output.level=INFO

#######DATABASE##################
spring.datasource.jdbc-url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PSW}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# --- Seconda connessione (mongo)
app.second-datasource.uri=${MONGODB_URL_AUTH}
app.second-datasource.database==${MONGODB_DB}

######FAULT-TOLERANCE#####################################
fault-utility.enable-fault-simulation=false

#######KAFKA CONSUMER SETTINGS################
#Autostart property for local start without running Kafka broker
#spring.kafka.consumer.auto-start=true

########JWT SECURITY################################
security.enable.jwt.configuration=false
security.skip.jwt.verification=true

########OPENTELEMETRY################################
management.opentelemetry.resource-attributes.service.name = ${spring.application.name}
management.opentelemetry.resource-attributes.cluster = local

## Save only a percentage of all traces
management.tracing.propagation.type=w3c
management.otlp.metrics.export.enabled=true


######## CONFIGURAZIONI S3 ################################
spring.cloud.aws.s3.enabled=false
spring.cloud.aws.region.auto=false
aws.s3.endpoint=${S3_ENDPOINT}
aws.s3.region=eu-west-1
aws.credentials.access-key=${S3_ACCESS_KEY}
aws.credentials.secret-key=${S3_SECRET_KEY}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

autenticazione.base-url=${API_AUTENTICAZIONE}
autenticazione.client-id=${AUTENTICAZIONE_CLIENT_ID}
