<div class="main">
  <p class="title">{{ title | translate }}</p>
  <p class="subTitle">{{ subTitleData | translate }}</p>
  <div class="row-grid">
    <piao-text-box
      [label]="labelEnte"
      [typeInput]="'text'"
      [inputClass]="'input'"
      [control]="form.controls['ente']"
      [maxValidatorLength]="50"
      [id]="'ente'"
      [descTooltip]="labelEnte"
      [isReadOnly]="true"
    >
    </piao-text-box>
    <piao-text-box
      [label]="labelPA"
      [typeInput]="'text'"
      [inputClass]="'input'"
      [control]="form.controls['ente']"
      [maxValidatorLength]="50"
      [id]="'ente'"
      [descTooltip]="labelPA"
    >
    </piao-text-box>
    <piao-text-box
      [label]="labelCF"
      [typeInput]="'text'"
      [inputClass]="'input'"
      [control]="form.controls['ente']"
      [maxValidatorLength]="50"
      [id]="'ente'"
      [descTooltip]="labelCF"
      [isReadOnly]="true"
    >
    </piao-text-box>
    <piao-text-box
      [label]="labelIPA"
      [typeInput]="'text'"
      [inputClass]="'input'"
      [control]="form.controls['ente']"
      [maxValidatorLength]="50"
      [id]="'ente'"
      [descTooltip]="labelIPA"
      [isReadOnly]="true"
    >
    </piao-text-box>

    <piao-dropdown
      [dropdown]="dropdown"
      [title]="labelTipPA"
      (isChange)="changePA($event)"
      [formControlName]="'tipologiaPA'"
      [isTooltip]="true"
      [dropContainerClass]="'piao-tipologia-pa'"
    ></piao-dropdown>

    <piao-text-box
      [label]="labelIVA"
      [typeInput]="'text'"
      [inputClass]="'input'"
      [control]="form.controls['ente']"
      [maxValidatorLength]="50"
      [id]="'ente'"
      [descTooltip]="labelIVA"
    >
    </piao-text-box>
  </div>

  <p class="subTitle">{{ subTitleLogic | translate }}</p>

  <div class="row-grid">
    <piao-text-box
      [label]="labelIndSL"
      [typeInput]="'text'"
      [inputClass]="'input'"
      [control]="form.controls['ente']"
      [maxValidatorLength]="50"
      [id]="'ente'"
      [descTooltip]="labelIndSL"
    >
    </piao-text-box>
    <piao-text-box
      [label]="labelIndUffRP"
      [typeInput]="'text'"
      [inputClass]="'input'"
      [control]="form.controls['ente']"
      [maxValidatorLength]="50"
      [id]="'ente'"
      [descTooltip]="labelIndUffRP"
    >
    </piao-text-box>
  </div>

  <p class="subTitle">{{ subTitleContact | translate }}</p>

  <div class="row-grid">
    <piao-text-box
      [label]="labelWeb"
      [typeInput]="'text'"
      [inputClass]="'input'"
      [control]="form.controls['ente']"
      [maxValidatorLength]="50"
      [id]="'ente'"
      [descTooltip]="labelWeb"
    >
    </piao-text-box>
    <piao-text-box
      [label]="labelEmail"
      [typeInput]="'text'"
      [inputClass]="'input'"
      [control]="form.controls['ente']"
      [maxValidatorLength]="50"
      [id]="'ente'"
      [descTooltip]="labelEmail"
    >
    </piao-text-box>
    <piao-text-box
      [label]="labelTel"
      [typeInput]="'text'"
      [inputClass]="'input'"
      [control]="form.controls['ente']"
      [maxValidatorLength]="50"
      [id]="'ente'"
      [descTooltip]="labelTel"
    >
    </piao-text-box>
    <piao-text-box
      [label]="labelPEC"
      [typeInput]="'text'"
      [inputClass]="'input'"
      [control]="form.controls['ente']"
      [maxValidatorLength]="50"
      [id]="'ente'"
      [descTooltip]="labelPEC"
    >
    </piao-text-box>
  </div>
  <div class="row-grid">
    <piao-text-box
      [label]="labelSocial"
      [typeInput]="'text'"
      [inputClass]="'input'"
      [control]="form.controls['ente']"
      [maxValidatorLength]="50"
      [id]="'ente'"
      [descTooltip]="labelSocial"
    >
    </piao-text-box>
  </div>

  <p class="subTitle-2">{{ subTitleDataRPCT | translate }}</p>

  <div class="row-grid">
    <piao-text-box
      [label]="labelName_RPCT"
      [typeInput]="'text'"
      [inputClass]="'input'"
      [control]="form.controls['ente']"
      [maxValidatorLength]="50"

      [label]="labelRole_RPCT"
      [typeInput]="'text'"
      [inputClass]="'input'"
      [control]="form.controls['ente']"
      [maxValidatorLength]="50"
      [id]="'ente'"
      [descTooltip]="labelRole_RPCT"
      [isReadOnly]="true"
    >
    </piao-text-box>
    <piao-text-box
      [label]="labelDate_RPCT"
      [typeInput]="'text'"
      [inputClass]="'input'"
      [control]="form.controls['ente']"
      [maxValidatorLength]="50"
      [id]="'ente'"
      [descTooltip]="labelDate_RPCT"
      [isReadOnly]="true"
    >
    </piao-text-box>
  </div>

  <p class="subTitle-2">{{ subTitleDataRTD | translate }}</p>

  <div class="row-grid">
    <piao-text-box
      [label]="labelN_RTD"

    </piao-text-box>
    <piao-text-box
      [label]="labelS_R_RTD"
      [typeInput]="'text'"
      [inputClass]="'input'"
      [control]="form.controls['ente']"
      [maxValidatorLength]="50"
      [id]="'ente'"
      [descTooltip]="labelS_R_RTD"
    >
    </piao-text-box>
  </div>

  <div class="container-attachment">
    <piao-attachment
      [title]="'SCRIVANIA_PA.SERVIZI_PIAO.INDICE_PIAO.SEZIONE.ATTACHMENT.TITLE_ATTACHMENTS'"
      [classTitle]="'class-title-logo'"
      [loadAttachment]="'SCRIVANIA_PA.SERVIZI_PIAO.INDICE_PIAO.SEZIONE.ATTACHMENT.LOAD_LOGO'"
      [idPiao]="piaoDTO.id"
      [isDoc]="false"
      [showDescription]="true"
      [showName]="false"
      [codTipologia]="codTipologia"
      [codTipologiaAllegato]="codTipologiaAllegato"
    ></piao-attachment>
  </div>
</div>
