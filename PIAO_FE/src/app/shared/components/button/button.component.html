<button (click)="onButtonClick()" [class]="getButtonClasses()" [class.disabled]="disabled || loading"
  [attr.title]="title" [attr.aria-label]="title" type="button">
  <!-- Icona a sinistra -->
  <span *ngIf="hasIcon() && iconPosition === 'left'" [class]="getIconClasses()" [innerHTML]="getSanitizedIcon()"
    class="flex-shrink-0"></span>

  <!-- Spinner di caricamento (sostituisce l'icona se loading è true) -->
  <span *ngIf="loading && iconPosition === 'left'" [class]="getIconClasses()" class="animate-spin flex-shrink-0">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor"
        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
      </path>
    </svg>
  </span>

  <!-- Contenuto del bottone (testo) -->
  <span *ngIf="!iconOnly" class="flex-shrink-0">
    <ng-content></ng-content>
  </span>

  <!-- Icona a destra -->
  <span *ngIf="hasIcon() && iconPosition === 'right' && !loading" [class]="getIconClasses()"
    [innerHTML]="getSanitizedIcon()" class="flex-shrink-0"></span>

  <!-- Spinner di caricamento (sostituisce l'icona se loading è true) -->
  <span *ngIf="loading && iconPosition === 'right'" [class]="getIconClasses()" class="animate-spin flex-shrink-0">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor"
        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
      </path>
    </svg>
  </span>
</button>
