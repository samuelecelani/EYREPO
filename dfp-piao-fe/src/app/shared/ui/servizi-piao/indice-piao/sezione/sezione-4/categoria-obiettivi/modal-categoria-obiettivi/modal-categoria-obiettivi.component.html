<div [ngClass]="main">
  <p class="title">{{ labelTitle | translate }}</p>
  <p class="sub-title pt-2">{{ labelDesc | translate }}</p>
  <p class="alert-label pt-4">
    {{ 'MESSAGE.ALERT_MANDATORY_FIELDS' | translate }}
  </p>
  <form [formGroup]="formGroup">
    <div class="container-full pt-3">
      <div class="row">
        <div class="col-12 col-lg-6">
          <piao-dropdown
            [title]="labelSottoFase | translate"
            [formControl]="formGroup.controls['idSottofase']"
            [dropdown]="dropdownSottofaseMonitoraggio"
            [isTooltip]="true"
            [dropContainerClass]="'container-width-full'"
            [isRequired]="true"
            [idName]="'sottoFaseMonitoraggio'"
            (isChange)="handleLoadAttore($event)"
          >
          </piao-dropdown>
        </div>

        <div class="col-12 col-lg-6">
          <piao-dropdown
            [title]="labelCategoria | translate"
            [formControl]="formGroup.controls['idCategoriaObiettivi']"
            [dropdown]="dropdownCategoriaObiettivi"
            [isTooltip]="true"
            [dropContainerClass]="'container-width-full'"
            [isRequired]="true"
          >
          </piao-dropdown>
        </div>

        <piao-dynamic-attivita-fields
          [formGroup]="formGroup"
          [dynamicAttivitaConfig]="attivitaConfig"
          [nameArrayForm]="'attivita.propertyAttivita'"
          [propertiesPath]="'attivita.propertyAttivita'"
          [titleLabel]="'SEZIONE_4.MODAL_CATEGORIA_OBIETTIVO.ATTIVITA_TITLE'"
          [notFoundLabel]="'SEZIONE_4.MODAL_CATEGORIA_OBIETTIVO.ATTIVITA_NOT_FOUND'"
          [addFieldLabel]="'SEZIONE_4.MODAL_CATEGORIA_OBIETTIVO.ATTIVITA_ADD'"
          [isFirstRemove]="true"
          (modalOpened)="handleAddModalOpened()"
          (modalClosed)="handleAddModalClosed()"
          (modalDeleteOpened)="handleAddModalOpened()"
          (modalDeleteClosed)="handleAddModalClosed()"
          [columnClass]="'col-12'"
          [isTooltip]="true"
        >
        </piao-dynamic-attivita-fields>

        <piao-dynamic-dropdown-fields
          [formGroup]="formGroup"
          [dynamicTBConfig]="attoriConfig"
          [nameArrayForm]="'attore.properties'"
          [containerInputClass]="'container-width-25'"
          [propertiesPath]="'attore.properties'"
          [dropdown]="dropdownAttori"
          [titleLabel]="titleAttoriCoinvolti"
          [notFoundLabel]="notFoundAttoriCoinvolti"
          [addFieldLabel]="addAttoriCoinvolti"
          [isFirstRemove]="true"
          [isTooltip]="true"
          (modalOpened)="handleAddModalOpened()"
          (modalClosed)="handleAddModalClosed()"
          (modalDeleteOpened)="handleAddModalOpened()"
          (modalDeleteClosed)="handleAddModalClosed()"
          [columnClass]="'col-12 col-xl-6 col-lg-6'"
        >
        </piao-dynamic-dropdown-fields>

        <piao-dynamic-tb-fields
          [formGroup]="formGroup"
          [dynamicTBConfig]="ulterioreInfo"
          [nameArrayForm]="'ulterioriInfo.properties'"
          [modalType]="'ulterioreInfo'"
          [containerInputClass]="'container-width-18-5'"
          [propertiesPath]="'ulterioriInfo.properties'"
          [titleLabel]="'INDICATORI.MODAL.ADD_INFO.TITLE'"
          [notFoundLabel]="'INDICATORI.MODAL.ADD_INFO.NOT_FOUND'"
          [addFieldLabel]="'INDICATORI.MODAL.ADD_INFO.ADD_FIELD'"
          (modalOpened)="handleAddModalOpened()"
          (modalClosed)="handleAddModalClosed()"
          (modalDeleteOpened)="handleAddModalOpened()"
          (modalDeleteClosed)="handleAddModalClosed()"
          [columnClass]="'col-12 col-xl-6 col-lg-6'"
        >
        </piao-dynamic-tb-fields>
      </div>
    </div>
  </form>
</div>
