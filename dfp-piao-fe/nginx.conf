
# PID in /tmp per utente non-root
pid /tmp/nginx.pid;

worker_processes auto;

events {
    worker_connections 1024;
}

http {

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Temp paths in /tmp per utente non-root
    proxy_temp_path /tmp/proxy_temp;
    client_body_temp_path /tmp/client_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # Log su stdout/stderr
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # Compressione gzip per file statici
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    map $request_id $csp_nonce {
        default $request_id;
    }

    # Abilita sub_filter per iniettare nonce nell'HTML
    sub_filter_once off;
    sub_filter_types text/html;

    server {
        listen 8080;

        absolute_redirect off;
        # Radice dell'app Angular
        root /usr/share/nginx/html;
        index index.html;

        # SPA routing
        location /area-riservata/ {
            try_files $uri $uri/ /area-riservata/index.html;
            # Inietta il nonce come attributo globale nell'HTML
            sub_filter '<head>' '<head><meta property="csp-nonce" content="$csp_nonce">';
        }

        # Disabilita accesso ai file nascosti
        location ~ /\. {
            deny all;
        }

        # Cache per file statici (1 mese)
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?)$ {
            expires 1M;
            add_header Cache-Control "public";
        }

        # File di configurazione: no-cache per poter aggiornare senza rebuild
        location /area-riservata/config-static-storico/ {
            add_header Cache-Control "no-cache, must-revalidate";
            add_header Pragma "no-cache";
        }

	location = / {
            return 301 /area-riservata/;
        }
        # Health check semplice
        location /area-riservata/health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Headers di sicurezza base
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # CSP aggiornata con connect-src per API su localhost:9082
	    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'nonce-$csp_nonce' 'sha256-47DEQpj8HBSa+/TImW+5JCeuQeRkm5NMpJWZG3hSuFU=' 'sha256-wPXhisdsFu1DtHYH1D9W5isSGqS5vIPn6QJWSNLqfCM=' 'sha256-dh9oI9UPbCE5zYKYoVgkz/V5cg/4dci2DpOJxbHZ1+E='; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http://localhost:8098 https://localhost:8543 https://keycloak.ey.test:8543 https://sso.dfp.gov.it https://sso-coll.dfp.gov.it; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self';" always;
    }
}
