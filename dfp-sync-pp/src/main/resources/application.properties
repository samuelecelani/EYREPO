server.port=${port:8080}
info.app.name=dfp-sync-pp
info.app.description=Modulo di sincronizzazione per la piattaforma del Portale Pubblico
info.app.version=1.0.0
spring.application.name=dfp-sync-pp
spring.jmx.enabled=false
spring.main.lazy-initialization=false
spring.main.web-application-type=reactive

######OPENAPI#####################################
springdoc.swagger-ui.path=/openapi-ui
springdoc.api-docs.path=/openapi

########JWT SECURITY################################
security.enable.jwt.configuration=false
jwt.unauthenticated-matcher=/health/**,/health/ready,/health/live,/openapi-ui/**,/openapi/**,/v3/api-docs/**,/swagger-ui/**

#######DATABASE##################
spring.datasource.url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PSW}
spring.datasource.schema=${POSTGRES_SCHEMA}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never

#######EXTERNAL##################
external.service.url.gateway=http://${GATEWAY_SVC}


