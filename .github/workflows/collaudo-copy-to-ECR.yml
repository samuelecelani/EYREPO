name: COLLAUDO - Nexus-Bip Copy to ECR

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: "Indicare la versione (es: 1.2.3)"
        required: true
        type: string
      deployment:
        description: 'Seleziona il deployment'
        required: true
        type: choice
        options:
          - TUTTI
            - dfp-piao-be
          - dfp-piao-bff
          - dfp-piao-fe
          - dfp-piao-gateway
          - dfp-sync-pp
        default: TUTTI

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: test
    strategy:
      matrix:
        image: ["dfp-piao-be", "dfp-piao-bff", "dfp-piao-fe", "dfp-piao-gateway", "dfp-sync-pp"]
    env:
      PATH_NEXUS_IMAGE_REGISTRY: "dfp-docker-repo"
      NEXUS_HOST: "nexus.bip.test"
      NEXUS_IP: "20.229.105.117"
      NEXUS_IMAGE_REGISTRY: "nexus.bip.test"
      NEXUS_IMAGE_REGISTRY_USERNAME: "devops"
      NEXUS_IMAGE_REGISTRY_PASSWORD: ${{ secrets.NEXUS_IMAGE_REGISTRY_PASSWORD }}
      ECR_IMAGE_REGISTRY: "354280290990.dkr.ecr.eu-south-1.amazonaws.com"
      PATH_ECR_IMAGE_REGISTRY: "dfp-coll-repo"

    steps:
      # 1. Imposta versione
      - name: Acquisisci versione
        if: ${{ github.event.inputs.deployment == 'TUTTI' || matrix.image == github.event.inputs.deployment }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      # 2. Configure AWS credentials
      - name: Configure AWS credentials
        if: ${{ github.event.inputs.deployment == 'TUTTI' || matrix.image == github.event.inputs.deployment }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: eu-south-1

      # 3. Login to ECR
      - name: Login to Amazon ECR
        if: ${{ github.event.inputs.deployment == 'TUTTI' || matrix.image == github.event.inputs.deployment }}
        run: |
          aws ecr get-login-password --region eu-south-1 | docker login --username AWS --password-stdin $ECR_IMAGE_REGISTRY

      # 3. Configurazione DNS locale per Nexus
      - name: Configurazione DNS locale per Nexus
        if: ${{ github.event.inputs.deployment == 'TUTTI' || matrix.image == github.event.inputs.deployment }}
        run: |
          echo ">>> Configurazione DNS locale per Nexus..."
          if ! grep -q "${NEXUS_IP} ${NEXUS_HOST}" /etc/hosts; then
            echo "${NEXUS_IP} ${NEXUS_HOST}" | sudo tee -a /etc/hosts > /dev/null
            echo "Entry DNS locale aggiunta"
          else
            echo "Entry DNS già presente"
          fi

      # 4️. Recupero e configurazione TLS
      - name: Recupera certificato TLS dal registry
        if: ${{ github.event.inputs.deployment == 'TUTTI' || matrix.image == github.event.inputs.deployment }}
        run: |
          CERT_FILE=$(mktemp)
          echo | openssl s_client -showcerts -servername $NEXUS_IMAGE_REGISTRY -connect $NEXUS_IMAGE_REGISTRY:443 2>/dev/null \
            | openssl x509 -outform PEM > $CERT_FILE
          echo "CERT_FILE=$CERT_FILE" >> $GITHUB_ENV

      - name: Configura Docker con certificato TLS
        if: ${{ github.event.inputs.deployment == 'TUTTI' || matrix.image == github.event.inputs.deployment }}
        run: |
          sudo mkdir -p /etc/docker/certs.d/$NEXUS_IMAGE_REGISTRY
          sudo cp $CERT_FILE /etc/docker/certs.d/$NEXUS_IMAGE_REGISTRY/ca.crt
          sudo chmod 644 /etc/docker/certs.d/$NEXUS_IMAGE_REGISTRY/ca.crt
          sudo chmod 755 /etc/docker/certs.d/$NEXUS_IMAGE_REGISTRY
          echo "Certificato aggiunto al trust path di Skopeo"

      # 5. Docker login
      - name: Docker login
        if: ${{ github.event.inputs.deployment == 'TUTTI' || matrix.image == github.event.inputs.deployment }}
        run: |
          sudo systemctl restart systemd-resolved
          sudo resolvectl flush-caches || true
          echo "${{ secrets.NEXUS_IMAGE_REGISTRY_PASSWORD }}" | docker login $NEXUS_IMAGE_REGISTRY \
            -u $NEXUS_IMAGE_REGISTRY_USERNAME --password-stdin

      # 6. Copy image Nexus to ECR
      - name: Copy image Nexus to ECR
        if: ${{ github.event.inputs.deployment == 'TUTTI' || matrix.image == github.event.inputs.deployment }}
        run: |
          IMAGE_NAME=${{ matrix.image }}
          
          aws ecr describe-repositories \
            --repository-names "collaudo/$IMAGE_NAME" \
            --region eu-south-1 \
            >/dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name "collaudo/$IMAGE_NAME" \
            --region eu-south-1

          skopeo copy \
          docker://$NEXUS_IMAGE_REGISTRY/$PATH_NEXUS_IMAGE_REGISTRY/$IMAGE_NAME:$VERSION \
          docker://$ECR_IMAGE_REGISTRY/collaudo/$IMAGE_NAME:$VERSION