# ================================ BACKEND ================================

services:
  piao-gateway:
    image: piao-gateway:0.0.0
    pull_policy: never
    build:
      context: ./dfp-piao-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    extra_hosts:
      - "dfp-piao.ey.test:host-gateway"
    environment: *backend-env
    networks:
      default:
        aliases:
          - dfp-piao-gateway-svc

  # backend-BE:
  dfp-piao-be:
    image: piao-be:0.0.0
    pull_policy: never
    build:
      context: ./dfp-piao-be
      dockerfile: Dockerfile
    ports:
      - "9081:8080"
    extra_hosts:
      - "dfp-piao.ey.test:host-gateway"
    environment: *backend-env

  # backend-BFF:
  dfp-piao-bff:
    image: piao-bff:0.0.0
    pull_policy: never
    build:
      context: ./dfp-piao-bff
      dockerfile: Dockerfile
    ports:
      - "9082:8080"
    extra_hosts:
      - "dfp-piao.ey.test:host-gateway"
    environment:
      <<: *backend-env
      NOTIFICHE_SVC: "host.minikube.internal:9183"
      
  # sync-pp:
  dfp-sync-pp:
    image: sync-pp:0.0.0
    pull_policy: never
    build:
      context: ./dfp-sync-pp
      dockerfile: Dockerfile
    ports:
      - "9083:8080"
    extra_hosts:
      - "dfp-piao.ey.test:host-gateway"
    environment:
      <<: *backend-env
      NOTIFICHE_SVC: "host.minikube.internal:9183"
# ================================ FRONTEND ================================

  piao-fe:
    image: piao-fe:0.0.0
    pull_policy: never
    build:
      context: ./dfp-piao-fe
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    extra_hosts:
      - "dfp-piao.ey.test:host-gateway"
    environment:
      ANGULAR_APP_API_URL: "http://localhost:9081"

