server.port=${port:8080}
# Forza WebFlux reattivo con Netty (NON Tomcat/MVC)
spring.main.web-application-type=reactive
server.max-http-request-header-size=${MAX_HTTP_HEADER_SIZE:3145728}

info.app.name=Spring Generic Application
info.app.description=This application is for demo purpose.
info.app.version=1.0.0
spring.application.name=piao-bff
spring.jmx.enabled=false
spring.main.lazy-initialization=false


######OPENAPI#####################################
springdoc.swagger-ui.path=/openapi-ui
springdoc.api-docs.path=/openapi

######Cookie##########
app.cookie.secure=false
app.cookie.httpOnly=true
app.cookie.sameSite=Lax
# Log Hikari (pool di connessione)
logging.level.com.zaxxer.hikari.HikariConfig=ERROR
logging.level.com.zaxxer.hikari.pool.HikariPool=ERROR


# Riduci la verbosita di Envers
logging.level.org.hibernate.envers=warn

############URL CHIAMATA A API#############
external.service.url.api=http://${BE_SVC}/api
external.service.url.notifica-be=http://${notifiche_SVC:}

external.service.url.opencms=${URL_OPENCMS:http://localhost:8080}
external.service.url.ticket-be=http://${ticket-service_SVC:localhost:9087}
external.service.url.ipa=${URL_IPA:https://ac-api-coll.dfp.gov.it}
external.service.url.sync-pp=http://${SYNC_PP_SVC:localhost:9086}
#########KEYKLOACK############
auth.client-id=${KEYKLOACK_CLIENT_ID:piaoClient}
auth.oauth2-url=${KEYKLOACK_URL:http://localhost:8080/realms/PIAO}
auth.scopes=openid,profile,email

# Configurazione JWT per validare i token Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYKLOACK_URL:http://localhost:8080/realms/PIAO}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYKLOACK_URL:http://localhost:8080/realms/PIAO}/protocol/openid-connect/certs

##########CACHE#########
spring.cache.type=caffeine
spring.cache.cache-names=piao
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m



######ActiveMq#################

spring.activemq.broker-url=${ACTIVEMQ_URL}
spring.activemq.user=${ACTIVEMQ_USERNAME}
spring.activemq.password=${ACTIVEMQ_PASSWORD}
consumer.variable.confirmation-topic=${CONFIRMATION_TOPIC}

######## CONFIGURAZIONI S3 ################################
spring.cloud.aws.s3.enabled=false
spring.cloud.aws.region.auto=false
aws.s3.endpoint=${S3_ENDPOINT:}
aws.s3.bucket=${S3_BUCKET}
aws.s3.bucket-definitive=${S3_BUCKET_DEFINITIVE:${S3_BUCKET}}
aws.s3.region=${S3_REGION:eu-south-1}
aws.credentials.access-key=${S3_ACCESS_KEY}
aws.credentials.secret-key=${S3_SECRET_KEY}

######## ANTIVIRUS ################################
antivirus.enabled=${ANTIVIRUS_ENABLED:false}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# (Configurazione auth.* usata per Keycloak - vedi sopra)

###########Config-FE#########
internal.service.isProduction = ${IS_PRODUCTION:false}
internal.service.url.public.minerva = ${URL_PUBLIC_MINERVA:http://localhost:9082}
internal.service.url.public.performance = ${PUBLIC_URL_PORTALE_PERFORMANCE:http://localhost:8080}
internal.service.url.api = ${PUBLIC_API_ENDPOINT:/api/piao/bff}
internal.service.loginType = ${LOGIN_TYPE:openid}
internal.service.localStorageToken = ${LOCAL_STORAGE_TOKEN:access_token}
internal.service.tokenHeader = ${TOKEN_HEADER:Authorization}
internal.service.tokenHeaderPrefix = ${TOKEN_HEADER_PREFIX:}
internal.service.openidIssuerUrl = ${OPENID_ISSUER_URL:http://localhost:8098/realms/PIAO}
internal.service.openidRedirectUri = ${OPENID_REDIRECT_URI:http://localhost:4200}
internal.service.openidLogoutUrl = ${OPENID_LOGOUT_URL:http://localhost:8098/realms/PIAO/protocol/openid-connect/logout}
internal.service.openidPostlogoutRedirectUri = ${OPENID_POSTLOGOUT_REDIRECT_URI:http://localhost:4200}
internal.service.openidClientId = ${OPENID_CLIENTID:piaoClient}
internal.service.openidResponseType = ${OPENID_RESPONSE_TYPE:code}
internal.service.openidScope = ${OPENID_SCOPE:openid profile}
internal.service.openidOidc = ${OPENID_OIDC:true}
internal.service.openidShowDebugInfo = ${OPENID_SHOW_DEBUG_INFO:true}
internal.service.openidRequireHttps = ${OPENID_REQUIRE_HTTPS:false}
internal.service.openidSkipIssuerCheck = ${OPENID_SKIP_ISSUER_CHECK:true}
internal.service.openidStrictDiscoveryDocValidation = ${OPENID_STRICT_DISCOVERY_DOC_VALIDATION:true}
internal.service.openidPreserveRequestRoute = ${OPENID_PRESERVE_REQUEST_ROUTE:true}
internal.service.openidTimeoutFactor = ${OPENID_TIMEOUT_FACTOR:0.7}
internal.service.pdfLowTextThreshold = ${PDF_LOW_TEXT_THRESHOLD:35}
internal.service.pdfMinTotalChars = ${PDF_MIN_TOTAL_CHARS:800}
internal.service.pdfMinDensityPerKb = ${PDF_MIN_DENSITY_PER_KB:2.0}
internal.service.pdfMaxLowPagesPct = ${PDF_MAX_LOW_PAGES_PCT:70}

########JWT SECURITY################################
jwt.unauthenticated-matcher=/health/**,/health/ready,/health/live,/h2-console/**,/openapi-ui/**,/openapi/**,/v3/api-docs/**,/swagger-ui/**,/v1/softskills/**

################# Resilience4j #########################
# CIRCUIT BREAKER
resilience4j.circuitbreaker.instances.example.base-config=shared
resilience4j.circuitbreaker.configs.shared.register-health-indicator=true
resilience4j.circuitbreaker.configs.shared.sliding-window-type=count-based
resilience4j.circuitbreaker.configs.shared.sliding-window-size=5
resilience4j.circuitbreaker.configs.shared.failure-rate-threshold=40
resilience4j.circuitbreaker.configs.shared.slow-call-rate-threshold=40
resilience4j.circuitbreaker.configs.shared.permitted-number-of-calls-in-half-open-state=1
resilience4j.circuitbreaker.configs.shared.max-wait-duration-in-half-open-state=10s
resilience4j.circuitbreaker.configs.shared.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.shared.slow-call-duration-threshold=2s
resilience4j.circuitbreaker.configs.shared.writable-stack-trace-enabled=true
resilience4j.circuitbreaker.configs.shared.automatic-transition-from-open-to-half-open-enabled=true

######MINERVA###############################
minerva.mock=${MOCK_MINERVA:false}
minerva.url=${URL_MINERVA:http://localhost:9082}
minerva.url.token=${URL_TOKEN_MINERVA:http://localhost:9082}
minerva.client_id=${CLIENT_ID_MINERVA:client-id-col}
minerva.client_secret=${CLIENT_SECRET_MINERVA:client-secret-col}
minerva.name_token=${NAME_TOKEN:access_token}

#################BIP#########################
external.service.url.bip=http://${GESTIONE_UTENTI_SVC:localhost:8069}

######WEBCLIENT##############################
webclient.max-in-memory-size-kb=${WEBCLIENT_MAX_BUFFER_KB:512}

######SSE HEARTBEAT##############################
notification.sse.heartbeat-interval-seconds=${SSE_HEARTBEAT_INTERVAL_SECONDS:15}
